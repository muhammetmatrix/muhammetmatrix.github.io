<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sana küçük bir şey</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 190, 120, 0.22), transparent 32%),
        radial-gradient(circle at 75% 70%, rgba(120, 170, 255, 0.20), transparent 35%),
        linear-gradient(135deg, #07070d 0%, #111827 45%, #1f160f 100%);
      color: white;
      font-family: Georgia, serif;
      overflow: hidden;
    }

    .screen {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative;
    }

    .sun {
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: rgba(255, 210, 140, 0.12);
      filter: blur(55px);
      animation: breathe 5s ease-in-out infinite alternate;
    }

    .stars span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.65);
      border-radius: 50%;
      animation: drift 10s linear infinite;
    }

    .stars span:nth-child(1) { left: 12%; top: 18%; animation-delay: 0s; }
    .stars span:nth-child(2) { left: 28%; top: 76%; animation-delay: 1.5s; }
    .stars span:nth-child(3) { left: 47%; top: 22%; animation-delay: 3s; }
    .stars span:nth-child(4) { left: 68%; top: 64%; animation-delay: 4.5s; }
    .stars span:nth-child(5) { left: 86%; top: 28%; animation-delay: 6s; }

    @keyframes breathe {
      from {
        transform: scale(0.85);
        opacity: 0.45;
      }
      to {
        transform: scale(1.18);
        opacity: 0.9;
      }
    }

    @keyframes drift {
      from {
        transform: translateY(0);
        opacity: 0.25;
      }
      50% {
        opacity: 0.9;
      }
      to {
        transform: translateY(-70px);
        opacity: 0.2;
      }
    }

    .content {
      z-index: 2;
      max-width: 780px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: clamp(32px, 6vw, 68px);
      font-weight: normal;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    p {
      font-size: clamp(18px, 3vw, 28px);
      line-height: 1.6;
      color: #eee;
      text-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    button {
      margin-top: 34px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.42);
      padding: 14px 30px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    .hidden {
      display: none;
    }

    .line {
      opacity: 0;
      transform: translateY(14px) scale(0.98);
      animation: lineIn 1.5s ease forwards;
      margin-bottom: 17px;
    }

    @keyframes lineIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .small {
      margin-top: 28px;
      font-size: 15px;
      color: rgba(255,255,255,0.62);
    }
  </style>
</head>

<body>
  <audio id="song" src="audio1.mp3"></audio>

  <div class="screen">
    <div class="sun"></div>

    <div class="stars">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="content" id="intro">
      <h1>Yine sen.</h1>
      <p>Bu sefer biraz daha başka.</p>
      <p class="small">Hazırsan dokun.</p>
      <button onclick="start()">Başlat</button>
    </div>

    <div class="content hidden" id="lyricsBox">
      <div id="lyrics"></div>
    </div>
  </div>

  <script>
    const song = document.getElementById("song");
    const intro = document.getElementById("intro");
    const lyricsBox = document.getElementById("lyricsBox");
    const lyrics = document.getElementById("lyrics");

    const lines = [
      "Bazı şarkılar gece gibi değildir.",
      "Bazıları gün batımı gibi gelir.",
      "Biraz uzak, biraz sıcak, biraz hatıra gibi.",
      "Bu şarkı da öyle hissettiriyor.",
      "Sanki kalabalığın içinde sadece seni görmüşüm gibi.",
      "Sanki her ışık biraz sana benziyormuş gibi.",
      "Ben bu şarkıyı dinlerken",
      "bir yere gitmek istemiyorum aslında.",
      "Sadece o anın içinde kalmak istiyorum.",
      "Çünkü bazı insanlar",
      "bir şarkıdan daha uzun süre akılda kalır.",
      "Sen de onlardan birisin."
    ];

    function start() {
      song.volume = 0.72;
      song.play();

      intro.classList.add("hidden");
      lyricsBox.classList.remove("hidden");

      showLines();
    }

    function showLines() {
      lines.forEach((text, index) => {
        setTimeout(() => {
          const line = document.createElement("p");
          line.className = "line";
          line.textContent = text;
          lyrics.appendChild(line);
        }, index * 3300);
      });
    }
  </script>
</body>
</html>
