<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sana küçük bir şey</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #000;
      color: white;
      font-family: "Georgia", serif;
      overflow: hidden;
    }

    .screen {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 320px;
      height: 320px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      filter: blur(70px);
      animation: pulse 4s infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(0.9);
        opacity: 0.4;
      }
      to {
        transform: scale(1.2);
        opacity: 0.8;
      }
    }

    .content {
      z-index: 2;
      max-width: 760px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: clamp(30px, 6vw, 64px);
      font-weight: normal;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    p {
      font-size: clamp(18px, 3vw, 28px);
      line-height: 1.6;
      color: #ddd;
    }

    button {
      margin-top: 32px;
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    .hidden {
      display: none;
    }

    .line {
      opacity: 0;
      transform: translateY(12px);
      animation: lineIn 1.4s ease forwards;
      margin-bottom: 16px;
    }

    @keyframes lineIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .small {
      margin-top: 28px;
      font-size: 15px;
      color: #888;
    }
  </style>
</head>

<body>
  <audio id="song" src="audio.mp3"></audio>

  <div class="screen">
    <div class="glow"></div>

    <div class="content" id="intro">
      <h1>Selam Berra.</h1>
      <p>Bu şarkı sana.</p>
      <p class="small">Hazırsan dokun.</p>
      <button onclick="start()">Başlat</button>
    </div>

    <div class="content hidden" id="lyricsBox">
      <div id="lyrics"></div>
    </div>
  </div>

  <script>
    const song = document.getElementById("song");
    const intro = document.getElementById("intro");
    const lyricsBox = document.getElementById("lyricsBox");
    const lyrics = document.getElementById("lyrics");

    // Buraya telif hakkı sende olan sözleri veya kendi yazdığın satırları ekle.
    // "I Wanna Be Yours" tam sözlerini buraya yapıştırırsan telif açısından sorun olabilir.
    const lines = [
      "Bazı şarkılar vardır,",
      "insanın aklına direkt birini getirir.",
      "Bu da benim için öyle.",
      "Çalınca seni düşünüyorum.",
      "Gülüşünü, sesini, yanımda oluşunu...",
      "Ve galiba en çok da şunu:",
      "Benim en güzel tesadüfüm sensin.",
      "Bu şarkı sana.",
      "Çünkü bazı duygular konuşarak değil,",
      "böyle anlatılır."
    ];

    function start() {
      song.volume = 0.75;
      song.play();

      intro.classList.add("hidden");
      lyricsBox.classList.remove("hidden");

      showLines();
    }

    function showLines() {
      lines.forEach((text, index) => {
        setTimeout(() => {
          const line = document.createElement("p");
          line.className = "line";
          line.textContent = text;
          lyrics.appendChild(line);
        }, index * 2500);
      });
    }
  </script>
</body>
</html>
